# Cangjie CI/CD Pipeline — 仓颉单元测试自动化流水线
#
# 本流水线在以下事件触发:
#   - push 到 main/master 分支
#   - Pull Request 提交
#   - 手动触发 (workflow_dispatch)
#
# 流水线阶段:
#   1. 代码检出 (Checkout)
#   2. 安装仓颉工具链 (Setup Cangjie)
#   3. 编译检查 (Build)
#   4. 单元测试 + 覆盖率 (Test + Coverage)
#   5. 冒烟测试 (Smoke Tests — 快速验证)
#   6. 集成测试 (Integration Tests)
#   7. 生成测试报告 (JUnit XML)
#   8. 上传产物 (Artifacts)

name: 仓颉 CI/CD 单元测试流水线

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # 支持手动触发
    inputs:
      run-benchmarks:
        description: '是否运行性能基准测试'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CJPM_PROFILE: ci

jobs:
  # ============================================================
  # Job 1: 编译 + 单元测试 (核心 CI 任务)
  # ============================================================
  build-and-test:
    name: 构建与单元测试 (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --- 步骤 1: 检出代码 ---
      - name: 📥 检出代码 (Checkout)
        uses: actions/checkout@v4

      # --- 步骤 2: 安装仓颉工具链 ---
      # 使用 GitHub Marketplace 官方 Action: Zxilly/setup-cangjie
      - name: 🔧 安装仓颉工具链 (Setup Cangjie)
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: lts              # 长期支持版本通道
          version: auto             # 自动从 cjpm.toml 读取版本

      # --- 步骤 3: 显示工具链版本 ---
      - name: 📋 显示环境信息
        run: |
          echo "=== Cangjie 版本信息 ==="
          cjpm --version
          echo ""
          echo "=== 工作目录结构 ==="
          ls -la
          echo ""
          echo "=== src/ 目录 ==="
          find src/ -type f -name "*.cj" | sort

      # --- 步骤 4: 编译检查 ---
      - name: 🔨 编译检查 (cjpm build)
        run: cjpm build --profile=ci

      # --- 步骤 5: 运行全量单元测试 ---
      # --profile=ci 自动应用 cjpm.toml 中 [profile.ci] 的配置
      - name: 🧪 运行单元测试 (cjpm test)
        run: |
          cjpm test --profile=ci \
            --report-path=test-reports \
            --report-format=xml \
            --no-progress

      # --- 步骤 6: 运行冒烟测试 (仅 @Tag("Smoke") 用例) ---
      - name: 🚬 冒烟测试 (Smoke Tests)
        run: cjpm test --include-tags=Smoke --no-progress

      # --- 步骤 7: 运行集成测试 (仅 @Tag("Integration") 用例) ---
      - name: 🔗 集成测试 (Integration Tests)
        run: cjpm test --include-tags=Integration --no-progress

      # --- 步骤 8: 测试覆盖率 (cjpm test --coverage + cjcov) ---
      - name: 📊 测试覆盖率 (Coverage)
        run: |
          cjpm test --coverage --no-progress
          cjcov --root=./ --html-details -o coverage-html
          echo "覆盖率报告已生成到 coverage-html/ 目录"

      # --- 步骤 9: 上传 XML 测试报告 (供 CI 系统解析) ---
      - name: 📤 上传测试报告 (JUnit XML)
        if: always()  # 即使测试失败也上传报告
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-xml
          path: test-reports/
          retention-days: 30

      # --- 步骤 10: 上传覆盖率 HTML 报告 ---
      - name: 📤 上传覆盖率报告 (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage-html/
          retention-days: 30

      # --- 步骤 11: 发布 JUnit 测试结果摘要 ---
      - name: 📋 发布测试结果摘要
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: 仓颉单元测试结果
          path: test-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  # ============================================================
  # Job 2: 多平台编译验证 (矩阵策略)
  # ============================================================
  build-matrix:
    name: 多平台编译验证 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装仓颉工具链
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: lts
          version: auto

      - name: 🔨 编译检查 (跨平台)
        run: cjpm build --profile=ci

      - name: 🧪 快速冒烟测试
        run: cjpm test --include-tags=Smoke --no-progress
