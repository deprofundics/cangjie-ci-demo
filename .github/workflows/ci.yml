# Cangjie CI/CD Pipeline — 仓颉单元测试自动化流水线
#
# 本流水线在以下事件触发:
#   - push 到 main/master 分支
#   - Pull Request 提交
#   - 手动触发 (workflow_dispatch)
#
# 流水线阶段:
#   1. 代码检出 (Checkout)
#   2. 安装仓颉工具链 (Setup Cangjie)
#   3. 编译检查 (Build)
#   4. 单元测试 + 覆盖率 (Test + Coverage)
#   5. 冒烟测试 (Smoke Tests — 快速验证)
#   6. 集成测试 (Integration Tests)
#   7. 生成测试报告 (JUnit XML)
#   8. 上传产物 (Artifacts)

name: 仓颉 CI/CD 单元测试流水线

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # 支持手动触发
    inputs:
      run-benchmarks:
        description: '是否运行性能基准测试'
        type: boolean
        default: false

env:
  CJPM_COLOR: never

jobs:
  # ============================================================
  # Job 1: 编译 + 单元测试 (核心 CI 任务)
  # ============================================================
  build-and-test:
    name: 构建与单元测试 (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --- 步骤 1: 检出代码 ---
      - name: 📥 检出代码 (Checkout)
        uses: actions/checkout@v4

      # --- 步骤 2: 安装仓颉工具链 ---
      # 使用 GitHub Marketplace 官方 Action: Zxilly/setup-cangjie
      - name: 🔧 安装仓颉工具链 (Setup Cangjie)
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: lts              # 长期支持版本通道
          version: auto             # 自动从 cjpm.toml 读取版本

      # --- 步骤 3: 显示工具链版本 ---
      - name: 📋 显示环境信息
        run: |
          echo "=== Cangjie 版本信息 ==="
          cjpm --version
          echo ""
          echo "=== 工作目录结构 ==="
          ls -la
          echo ""
          echo "=== src/ 目录 ==="
          find src/ -type f -name "*.cj" | sort

      # --- 步骤 4: 编译检查 ---
      - name: 🔨 编译检查 (cjpm build)
        run: cjpm build

      # --- 步骤 5: 运行全量单元测试 ---
      - name: 🧪 运行单元测试 (cjpm test)
        run: cjpm test --no-progress

      # --- 步骤 6: 运行冒烟测试 (仅 @Tag("Smoke") 用例) ---
      - name: 🚬 冒烟测试 (Smoke Tests)
        run: cjpm test --include-tags=Smoke --no-progress

      # --- 步骤 7: 运行集成测试 (仅 @Tag("Integration") 用例) ---
      - name: 🔗 集成测试 (Integration Tests)
        run: cjpm test --include-tags=Integration --no-progress

      # --- 步骤 8: 测试覆盖率 (cjpm test --coverage) ---
      - name: 📊 测试覆盖率 (Coverage)
        run: cjpm test --coverage --no-progress

      # --- 步骤 9: 打印测试结果摘要 ---
      - name: 📋 测试结果摘要
        if: always()
        run: |
          echo "=============================================="
          echo "  仓颉 CI/CD 单元测试流水线 — 执行完毕"
          echo "=============================================="
          echo ""
          echo "  已执行测试阶段:"
          echo "    1. 全量单元测试 (cjpm test)"
          echo "    2. 冒烟测试 (@Tag Smoke)"
          echo "    3. 集成测试 (@Tag Integration)"
          echo "    4. 覆盖率测试 (--coverage)"
          echo ""
          echo "  所有测试均已通过! ✅"

  # ============================================================
  # Job 2: 多平台编译验证 (矩阵策略)
  # ============================================================
  build-matrix:
    name: 多平台编译验证 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    continue-on-error: true      # macOS 仓颉工具链存在链接兼容问题，不阻塞 CI
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装仓颉工具链
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: lts
          version: auto

      - name: 🔨 编译检查 (跨平台)
        run: cjpm build

      - name: 🧪 快速冒烟测试
        run: cjpm test --include-tags=Smoke --no-progress
